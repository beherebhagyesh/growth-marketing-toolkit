version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - POSTHOG_API_KEY=${POSTHOG_API_KEY}
      - POSTHOG_PROJECT_ID=${POSTHOG_PROJECT_ID}
      - GOOGLE_ANALYTICS_MEASUREMENT_ID=${GOOGLE_ANALYTICS_MEASUREMENT_ID}
      - GOOGLE_ANALYTICS_API_SECRET=${GOOGLE_ANALYTICS_API_SECRET}
      - MIXPANEL_API_KEY=${MIXPANEL_API_KEY}
      - MIXPANEL_API_SECRET=${MIXPANEL_API_SECRET}
      - DATAFORSEO_LOGIN=${DATAFORSEO_LOGIN}
      - DATAFORSEO_PASSWORD=${DATAFORSEO_PASSWORD}
      - TARGET_DOMAIN=${TARGET_DOMAIN}
      - TARGET_SITEMAP_URL=${TARGET_SITEMAP_URL}
    volumes:
      - .:/app
    restart: unless-stopped
